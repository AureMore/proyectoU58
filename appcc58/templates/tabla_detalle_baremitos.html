<table class="table table-striped table-info table-hover" >
    <thead>
      <tr style="text-align: center;">
        <th scope="col">#</th>
        <th scope="col">Fecha</th>
        <th scope="col">Descripcion</th>
        <th scope="col">Cantidad</th>
        <th scope="col" style="text-align: center;">Quitar</th>
      </tr>
    </thead>
    <tbody id="tbody-tblkit">
      {% for dsb in detallesubbaremocirugia %}
      <tr>
        <td>{{ forloop.counter }}</td>
        <td> {{ dsb.fecha_act | date:'d/m/Y H:i' }} </td>
        <td> {{ dsb.subbaremo }} </td>
        <td> {{ dsb.cantidad }} </td>
        <td style="text-align: center;"><button type="button" style="color: red; border:none;" onclick="eliminarBaremito('{{dsb.id}}', '{{dsb.detalle_id}}','{{dsb.cirugia_id}}')"><i class="fa-solid fa-trash-can-arrow-up" ></i></button></td>
      </tr>
      {% endfor %}
     
    </tbody>
  
  </table>
