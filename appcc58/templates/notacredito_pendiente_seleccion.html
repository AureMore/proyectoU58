<table id="tblnotacreditoseleccion"  class="table table-striped table-hover table-borderless table-primary align-middle p-2" >
    <thead class="table-light">
        <tr>
            <th>Id</th>
            <th>Fecha</th>
            <th>Descripcion de Nota Credito</th>
            <th style="text-align: right;">Monto(USD)</th>
            <th style="text-align: right;">Disponible(USD)</th>
            <th >usuario</th>
            <th>Seleccion</th>
        </tr>
    </thead>
    <tbody class="table-group-divider">
    
    {% for ncr in notascreditocliente  %}
    
            <tr>
                <td> {{ ncr.id }} </td>
                <td> {{ ncr.fecha_act | date:'d/m/Y' }} </td>
                <td >{{ ncr.descripcion }}</td>
                <td style="text-align: right;">{{ ncr.saldo | floatformat:2}} </td>
                <td style="text-align: right; border: none; padding: 2px;"><input type="number" name="" id="saldo_actual_{{ncr.id}}" value="{{ ncr.saldo_actual_nota_dl | floatformat:2}}" style="text-align: right; border: none; padding: 4px; border-radius: 4px;" onblur="validarMontoNC('{{ncr.saldo_actual_nota_dl}}', this.value, '{{ncr.id}}')"> </td>
                <td> {{ ncr.usuario }} </td>
                <td><input type="checkbox" class="fila-check" name="" id=""></td>
            </tr>
                
    {% endfor %}
        
    </tbody>
           
</table>
