    {% block jsextras %}
    <script>
      function iniciarVoz() {
        console.log('voz')
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = "es-ES";

        recognition.onresult = function(event) {
          const texto = event.results[0][0].transcript.toLowerCase();
          console.log("Dijiste:", texto);

          // Comando de voz
          if (texto.includes("pendiente médicos") || texto.includes("cobrar médicos") || texto.includes("cuenta médicos")) {
            document.getElementById("menu-medicos").click();
          }
        };

        recognition.start();
      }
    </script>
    {% endblock jsextras %}
  </body>
