{% extends "base_sin_menu.html" %}
{% load static %}

{% block contenido %}
<style>
    :root {
        --primary-u58: #00737a; /* El tono verde/azulado del logo */
        --secondary-u58: #81a3a6; /* El tono grisáceo del texto UNIDAD */
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
    }

    .thanks-container {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: var(--bg-gradient);
        font-family: 'Inter', sans-serif;
    }

    .thanks-card {
        background: white;
        max-width: 600px;
        width: 100%;
        padding: 50px 30px;
        border-radius: 24px;
        box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
        text-align: center;
        border: 1px solid rgba(255,255,255,0.8);
    }

    .logo-u58 {
        max-width: 280px;
        height: auto;
        margin-bottom: 40px;
        filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05));
    }

    .success-icon {
        width: 80px;
        height: 80px;
        background: #dcfce7;
        color: #166534;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
        margin: 0 auto 25px;
    }

    .thanks-card h1 {
        color: var(--primary-u58);
        font-weight: 800;
        font-size: 2.2rem;
        margin-bottom: 15px;
    }

    .thanks-card p {
        color: #64748b;
        font-size: 1.1rem;
        line-height: 1.6;
        margin-bottom: 40px;
    }

    .btn-finish {
        background: var(--primary-u58);
        color: white;
        padding: 16px 40px;
        border-radius: 12px;
        font-weight: 700;
        text-decoration: none;
        transition: all 0.3s ease;
        display: inline-block;
        border: none;
        box-shadow: 0 4px 6px rgba(0, 115, 122, 0.2);
    }

    .btn-finish:hover {
        background: #005a60;
        transform: translateY(-2px);
        color: white;
    }

    /* Animación de entrada */
    .thanks-card {
        animation: fadeInUp 0.6s ease-out;
    }

    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>

<div class="thanks-container">
    <div class="thanks-card">
        <img src="{% static 'imagen/fuq58.png' %}" alt="Unidad Quirúrgica 58" class="logo-u58">
        
        <div class="success-icon">
            <i class="fas fa-check"></i>
        </div>

        <h1>¡Evaluación Recibida!</h1>
        <p>Gracias por confiar en nosotros.<br> 
           La información ha sido procesada correctamente y el equipo de anestesiología ha sido notificado.</p>

        <a href="{% url 'salir' %}" class="btn-finish">
            FINALIZAR
        </a>
    </div>
</div>
{% endblock %}
