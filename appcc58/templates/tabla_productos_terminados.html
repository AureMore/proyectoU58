    <table id="tblmateriaprima" class="table table-hover table-striped table-primary" >
      <thead>
        <tr>
          <th scope="col">#</th>
         <th scope="col" >CODIGO</th>
          <th scope="col" >COMPUESTOS DEL PRODUCTO TERMINADO</th>
          <th scope="col" >NOTA</th>
          <th scope="col" >CANTIDAD</th>
          <th scope="col">PRECIO</th>
          <th scope="col" >SUBTOTAL</th>
          <th scope="col">DEPOSITO</th>
          <th scope="col">OPCION</th>
       
        </tr>
      </thead>
      <tbody>
        {% for dp in materiaprima %}  
        <tr>
          <th scope="row"> {{ forloop.counter }} </th>
          
          <td>{{dp.materia_prima.codigo}}</td>
          <td>{{dp.materia_prima}}</td>
          <td>{{dp.nota}}</td>
          <td >{{dp.cantidad}} </td>
          <td> {{dp.precio_dl}} </td>
          <td> {{dp.subtotal_precio_dl}} </td>
          <td> {{dp.deposito}} </td>
          <td> <button type="button" class="btn btn-sm btn-outline-danger" onclick="eliminarMateriaPrima('{{dp.id}}')"><i class="fa-solid fa-trash-can-arrow-up "></i></button></td>
       
        </tr>
        {% endfor %}
   
      </tbody>
    </table>
