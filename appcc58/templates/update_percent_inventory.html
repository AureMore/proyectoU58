{% extends "base.html" %}

{% block title %}Cambio Incremento{% endblock title %}
{% load static %}
{% block cssextras %}
    <link rel="stylesheet" href="{% static 'css/tools.css' %}"> 
    
{% endblock cssextras %}


{% block contenido %}

<form action="" method="post" class="form-horizontal p-5" >
{% csrf_token %}
<h6>Cambio Incremento</h6>
    <div class="container-tool" >
   
        <div class="input-group input-group-sm ">
            <div class="input-group-prepend">
              <span class="input-group-text" >Porcentaje Actual</span>
            </div>
            <input type="text" class="form-control form-control-sm" aria-label="Small" name="porcentajeincremento" aria-describedby="inputGroup-sizing-sm" value="{{ incremento.porcentaje | floatformat:2}}"  maxlength="10" required>
          </div>
          
          <div class="mt-3 text-start">
            <button class="myButtonGuardar" type="submit">Actualizar </button>
          </div>
   
    </div>

</form>

{% endblock contenido %}
